<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent | Chatsworth Jumping Castle Hire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1A2E5A 0%, #2d4a8a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 60px 56px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 2rem; font-weight: 800; color: #1A2E5A; margin-bottom: 14px; }
    p { font-size: 1rem; color: #4A5568; line-height: 1.7; margin-bottom: 32px; }
    a {
      display: inline-block;
      background: #FF6B00;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 13px 36px;
      border-radius: 50px;
      text-decoration: none;
      transition: background 0.3s;
    }
    a:hover { background: #e05d00; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Message Received!</h1>
    <p>Thank you for getting in touch with Chatsworth Jumping Castle Hire. We'll get back to you as soon as possible to assist with your booking.</p>
    <a href="index.html">Back to Home</a>
  </div>
</body>
</html>
